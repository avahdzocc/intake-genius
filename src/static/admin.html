<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intake Genius — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #C8C0A8;
      --surface: transparent;
      --surface-panel: #D4CDB4;
      --border: rgba(20, 16, 8, 0.1);
      --border-strong: rgba(20, 16, 8, 0.18);
      --primary: #0A0805;
      --primary-hover: #1F1C14;
      --text: #0A0805;
      --text-heading: #1F1C14;
      --muted: #847D65;
      --muted-dark: #5D5641;
      --accent-red: #8B3A26;
      --accent-green: #4D6A32;
      --radius: 2px;
      --shadow: none;
      --font: 'Inter', -apple-system, system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;

      /* status colours — earth tones */
      --c-new: #5D5641;
      --c-classifying: #5D5641;
      --c-conflict_check: #8B3A26;
      --c-routing: #5D5641;
      --c-scheduling: #5D5641;
      --c-awaiting_docs: #5D5641;
      --c-intake_complete: #4D6A32;
      --c-conflict_flagged: #8B3A26;
      --c-rejected: #847D65;
      --c-blocked: #8B3A26;
    }

    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-weight: 400; font-size: 13px; -webkit-font-smoothing: antialiased; }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      background: transparent;
      border-bottom: 1px solid var(--border-strong);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .logo { font-weight: 500; font-size: 13px; display: flex; align-items: center; gap: 8px; color: var(--text-heading); }
    .logo span { font-size: 15px; }
    .firm-name { font-family: var(--font-mono); color: var(--muted); font-size: 11px; font-weight: 400; }

    /* ── Layout ─────────────────────────────────────────────── */
    .shell { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 48px); }

    /* ── Sidebar ─────────────────────────────────────────────── */
    aside {
      background: transparent;
      border-right: 1px solid var(--border);
      padding: 16px 0;
      overflow-y: auto;
    }
    .sidebar-section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .12em;
      color: var(--muted);
      text-transform: uppercase;
      padding: 14px 16px 6px;
    }
    .filter-btn {
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      padding: 8px 16px;
      font-family: var(--font);
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background .15s;
    }
    .filter-btn:hover { background: rgba(20, 16, 8, 0.04); }
    .filter-btn.active { background: rgba(20, 16, 8, 0.06); color: var(--text-heading); font-weight: 500; }
    .badge {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 2px;
      background: rgba(20, 16, 8, 0.06);
      color: var(--muted);
    }
    .filter-btn.active .badge { background: var(--primary); color: #CEC7B0; }

    .sidebar-stats {
      margin: 16px;
      background: rgba(20, 16, 8, 0.04);
      border-radius: var(--radius);
      padding: 12px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
    }
    .sidebar-stats b { color: var(--text); font-size: 15px; display: block; font-family: var(--font); font-weight: 500; }

    /* ── Main ─────────────────────────────────────────────────── */
    main { padding: 28px 32px; overflow: auto; }

    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .search-bar input {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-bottom: 1px solid var(--border-strong);
      border-radius: 0;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 400;
      outline: none;
      background: transparent;
      color: var(--text);
    }
    .search-bar input:focus { border-bottom-color: var(--primary); box-shadow: none; }
    .search-bar input::placeholder { color: var(--muted); }

    /* ── Case table ─────────────────────────────────────────── */
    .case-table { width: 100%; border-collapse: collapse; background: transparent; border-radius: 0; overflow: visible; box-shadow: none; }
    .case-table th {
      text-align: left;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .1em;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-strong);
      background: transparent;
    }
    .case-table td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 400; vertical-align: middle; }
    .case-table tr:last-child td { border-bottom: none; }
    .case-table tr { cursor: pointer; transition: background .12s; }
    .case-table tr:hover td { background: rgba(20, 16, 8, 0.04); }

    .status-pill {
      display: inline-block;
      padding: 0;
      border-radius: 0;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .08em;
      background: none;
    }
    .status-NEW           { color: var(--c-new); }
    .status-CLASSIFYING   { color: var(--c-classifying); }
    .status-CONFLICT_CHECK { color: var(--c-conflict_check); }
    .status-ROUTING       { color: var(--c-routing); }
    .status-SCHEDULING    { color: var(--c-scheduling); }
    .status-AWAITING_DOCS { color: var(--c-awaiting_docs); }
    .status-INTAKE_COMPLETE { color: var(--c-intake_complete); }
    .status-CONFLICT_FLAGGED { color: var(--c-conflict_flagged); }
    .status-REJECTED      { color: var(--c-rejected); }
    .status-BLOCKED       { color: var(--c-blocked); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }

    /* ── Detail panel ─────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(10, 8, 5, 0.3);
      z-index: 200;
    }
    .overlay.open { display: block; }

    .detail-panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(680px, 95vw);
      background: var(--surface-panel);
      box-shadow: -2px 0 16px rgba(10, 8, 5, 0.08);
      z-index: 201;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform .25s ease;
    }
    .detail-panel.open { transform: translateX(0); }

    .panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 24px 28px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .panel-header h2 { font-size: 24px; font-weight: 400; margin-bottom: 4px; color: var(--text-heading); letter-spacing: -0.02em; }
    .panel-close {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
      line-height: 1;
      margin-top: -2px;
    }
    .panel-close:hover { color: var(--text); }

    .panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab-btn {
      padding: 10px 20px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab-btn.active { color: var(--text-heading); border-bottom-color: var(--primary); }

    .panel-body { flex: 1; overflow-y: auto; padding: 24px 28px; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
    .info-item label { font-family: var(--font-mono); font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; display: block; margin-bottom: 2px; }
    .info-item p { font-size: 15px; font-weight: 400; }

    .section-title { font-family: var(--font-mono); font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin: 20px 0 10px; }

    /* Audit log timeline */
    .audit-entry {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
      font-size: 13px;
    }
    .audit-dot {
      width: 6px; height: 6px;
      background: var(--muted-dark);
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 6px;
    }
    .audit-meta { font-family: var(--font-mono); color: var(--muted); font-size: 11px; margin-bottom: 2px; }
    .audit-content b { font-size: 13px; font-weight: 500; }
    .audit-reasoning { color: var(--muted); margin-top: 2px; }

    /* Agent Activity feed */
    .activity-feed { display: flex; flex-direction: column; gap: 0; position: relative; }
    .activity-feed::before {
      content: '';
      position: absolute;
      left: 17px;
      top: 8px;
      bottom: 8px;
      width: 1px;
      background: var(--border-strong);
    }
    .activity-item {
      display: flex;
      gap: 14px;
      padding: 12px 0;
      position: relative;
    }
    .activity-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      z-index: 1;
      border: 2px solid var(--surface-panel);
    }
    .activity-icon.sms { background: rgba(20, 16, 8, 0.06); }
    .activity-icon.calendar { background: rgba(77, 106, 50, 0.1); }
    .activity-icon.conflict { background: rgba(139, 58, 38, 0.1); }
    .activity-icon.classification { background: rgba(20, 16, 8, 0.06); }
    .activity-icon.task { background: rgba(20, 16, 8, 0.06); }
    .activity-icon.document { background: rgba(20, 16, 8, 0.06); }
    .activity-icon.agent { background: rgba(20, 16, 8, 0.04); }
    .activity-body { flex: 1; min-width: 0; }
    .activity-label { font-family: var(--font-mono); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 2px; }
    .activity-label.sms { color: var(--muted-dark); }
    .activity-label.calendar { color: var(--accent-green); }
    .activity-label.conflict { color: var(--accent-red); }
    .activity-label.classification { color: var(--muted-dark); }
    .activity-label.task { color: var(--muted-dark); }
    .activity-label.document { color: var(--muted-dark); }
    .activity-label.agent { color: var(--muted); }
    .activity-reasoning { font-size: 13px; line-height: 1.55; color: var(--text); }
    .activity-time { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 3px; }

    /* Docs */
    .doc-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 0;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 400;
    }
    .doc-received { color: var(--accent-green); font-weight: 600; }
    .doc-pending { color: var(--muted); }

    /* Engagement letter */
    .letter-box {
      background: rgba(20, 16, 8, 0.04);
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 24px;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.7;
      white-space: pre-wrap;
      font-family: Georgia, serif;
    }
    .letter-actions { display: flex; gap: 8px; margin-bottom: 12px; }

    .btn {
      padding: 8px 16px;
      border-radius: 0;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background .15s, opacity .15s;
    }
    .btn-primary { background: var(--primary); color: #CEC7B0; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-outline { background: transparent; border: 1px solid var(--border-strong); color: var(--text); }
    .btn-outline:hover { background: rgba(20, 16, 8, 0.04); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(20, 16, 8, 0.15);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div style="background:rgba(20,16,8,0.06);border-bottom:1px solid rgba(20,16,8,0.12);padding:8px 24px;font-size:.78rem;color:#5D5641;text-align:center;line-height:1.5;font-family:'IBM Plex Mono',monospace;letter-spacing:0.02em;">
  <strong>Demo Mode</strong> — Submit a test intake at <a href="/" style="color:#92400e;font-weight:600;text-decoration:underline;">the intake form</a> to see the AI agent pipeline in action.
</div>

<header>
  <div class="logo"><span>⚖️</span> Intake Genius <span class="firm-name" id="firm-name"></span></div>
  <a href="/" style="font-size:.85rem; color:var(--primary); text-decoration:none;">← Intake Form</a>
</header>

<div class="shell">
  <!-- Sidebar -->
  <aside>
    <div class="sidebar-stats">
      <b id="stat-total">—</b> total cases
      <div style="margin-top:6px" id="stat-week"></div>
    </div>

    <div class="sidebar-section-label">Filter by status</div>
    <button class="filter-btn active" data-status="" onclick="setFilter(this)">
      All cases <span class="badge" id="badge-all">—</span>
    </button>
    <button class="filter-btn" data-status="NEW" onclick="setFilter(this)">New <span class="badge" id="badge-NEW">—</span></button>
    <button class="filter-btn" data-status="SCHEDULING" onclick="setFilter(this)">Scheduling <span class="badge" id="badge-SCHEDULING">—</span></button>
    <button class="filter-btn" data-status="AWAITING_DOCS" onclick="setFilter(this)">Awaiting Docs <span class="badge" id="badge-AWAITING_DOCS">—</span></button>
    <button class="filter-btn" data-status="CONFLICT_FLAGGED" onclick="setFilter(this)">⚠️ Conflict <span class="badge" id="badge-CONFLICT_FLAGGED">—</span></button>
    <button class="filter-btn" data-status="INTAKE_COMPLETE" onclick="setFilter(this)">Complete <span class="badge" id="badge-INTAKE_COMPLETE">—</span></button>
    <button class="filter-btn" data-status="REJECTED" onclick="setFilter(this)">Rejected <span class="badge" id="badge-REJECTED">—</span></button>
    <button class="filter-btn" data-status="BLOCKED" onclick="setFilter(this)">Blocked <span class="badge" id="badge-BLOCKED">—</span></button>
  </aside>

  <!-- Main -->
  <main>
    <div class="search-bar">
      <input type="search" id="search" placeholder="Search by client name, case type, or ID…" oninput="renderTable()">
    </div>

    <table class="case-table">
      <thead>
        <tr>
          <th>Client</th>
          <th>Type</th>
          <th>Status</th>
          <th>Urgency</th>
          <th>Attorney</th>
          <th>Updated</th>
        </tr>
      </thead>
      <tbody id="case-tbody">
        <tr><td colspan="6"><div class="empty-state"><div class="spinner"></div></div></td></tr>
      </tbody>
    </table>
  </main>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>

<!-- Detail panel -->
<div class="detail-panel" id="detail-panel">
  <div class="panel-header">
    <div>
      <h2 id="panel-title">Case Detail</h2>
      <span id="panel-status-pill" class="status-pill"></span>
    </div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-tabs">
    <button class="tab-btn active" onclick="showTab('overview', this)">Overview</button>
    <button class="tab-btn" onclick="showTab('activity', this)">Agent Activity</button>
    <button class="tab-btn" onclick="showTab('audit', this)">Audit Log</button>
    <button class="tab-btn" onclick="showTab('docs', this)">Documents</button>
    <button class="tab-btn" onclick="showTab('letter', this)">Engagement Letter</button>
  </div>
  <div class="panel-body" id="panel-body">
    <div class="empty-state"><div class="spinner"></div></div>
  </div>
</div>

<script>
  const API = '/admin/api';
  let allCases = [];
  let currentFilter = '';
  let currentCase = null;
  let currentTab = 'overview';

  function getToken() { return sessionStorage.getItem('admin_token') || ''; }

  function showLoginPrompt() {
    document.getElementById('panel-body').innerHTML = `
      <div class="empty-state" style="max-width:340px;margin:60px auto;text-align:left;">
        <div style="font-weight:500;margin-bottom:12px;">Admin Authentication</div>
        <input id="token-input" type="password" placeholder="Enter API key"
          style="width:100%;padding:8px 10px;font-size:13px;border:1px solid var(--border-strong);border-radius:var(--radius);font-family:var(--font-mono);margin-bottom:10px;background:var(--surface-panel);">
        <button onclick="submitToken()" style="padding:6px 16px;font-size:12px;cursor:pointer;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--primary);color:var(--bg);font-family:var(--font);">Sign in</button>
        <div id="login-error" style="color:var(--accent-red);font-size:12px;margin-top:8px;display:none;">Invalid key. Try again.</div>
      </div>`;
    const inp = document.getElementById('token-input');
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') submitToken(); });
    inp.focus();
  }

  async function submitToken() {
    const token = document.getElementById('token-input').value.trim();
    if (!token) return;
    sessionStorage.setItem('admin_token', token);
    try {
      await apiFetch(`${API}/stats`);
      boot();
    } catch {
      sessionStorage.removeItem('admin_token');
      document.getElementById('login-error').style.display = 'block';
    }
  }

  // ── Boot ────────────────────────────────────────────────────
  async function boot() {
    try {
      await Promise.all([loadStats(), loadCases()]);
    } catch {
      showLoginPrompt();
    }
  }

  async function loadStats() {
    try {
      const s = await apiFetch(`${API}/stats`);
      document.getElementById('firm-name').textContent = '— ' + s.firm_name;
      document.getElementById('stat-total').textContent = s.total_cases;
      document.getElementById('stat-week').textContent = `${s.audit_entries_7d} agent actions (7d)`;
      document.getElementById('badge-all').textContent = s.total_cases;
      const statuses = ['NEW','SCHEDULING','AWAITING_DOCS','CONFLICT_FLAGGED','INTAKE_COMPLETE','REJECTED','BLOCKED'];
      statuses.forEach(st => {
        const el = document.getElementById('badge-' + st);
        if (el) el.textContent = (s.by_status[st] || 0);
      });
    } catch(e) { console.error(e); }
  }

  async function loadCases() {
    try {
      allCases = await apiFetch(`${API}/cases?limit=200`);
      renderTable();
    } catch(e) {
      document.getElementById('case-tbody').innerHTML =
        `<tr><td colspan="6"><div class="empty-state"><div class="icon">⚠️</div>Failed to load cases</div></td></tr>`;
    }
  }

  // ── Filter / search ─────────────────────────────────────────
  function setFilter(btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.status;
    renderTable();
  }

  function renderTable() {
    const q = (document.getElementById('search').value || '').toLowerCase().trim();
    const rows = allCases.filter(c => {
      if (currentFilter && c.status !== currentFilter) return false;
      if (!q) return true;
      return (c.client_name || '').toLowerCase().includes(q) ||
             (c.case_type || '').toLowerCase().includes(q) ||
             (c.id || '').toLowerCase().includes(q);
    });

    if (!rows.length) {
      document.getElementById('case-tbody').innerHTML =
        `<tr><td colspan="6"><div class="empty-state"><div class="icon">📂</div>No cases found</div></td></tr>`;
      return;
    }

    document.getElementById('case-tbody').innerHTML = rows.map(c => `
      <tr onclick="openCase('${c.id}')">
        <td><strong>${esc(c.client_name || '—')}</strong><br><small style="color:var(--muted)">${c.id.slice(0,8).toUpperCase()}</small></td>
        <td>${esc((c.case_type || 'unknown').replace(/_/g,' '))}</td>
        <td><span class="status-pill status-${c.status}">${c.status.replace(/_/g,' ')}</span></td>
        <td style="text-transform:capitalize">${esc(c.urgency || '—')}</td>
        <td>${esc(c.assigned_attorney_id ? '✓ Assigned' : '—')}</td>
        <td style="color:var(--muted);font-size:.8rem">${relativeTime(c.updated_at)}</td>
      </tr>
    `).join('');
  }

  // ── Detail panel ─────────────────────────────────────────────
  async function openCase(id) {
    document.getElementById('overlay').classList.add('open');
    document.getElementById('detail-panel').classList.add('open');
    document.getElementById('panel-body').innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';
    document.getElementById('panel-title').textContent = 'Loading…';

    try {
      currentCase = await apiFetch(`${API}/cases/${id}`);
      renderPanel(currentTab);
    } catch(e) {
      document.getElementById('panel-body').innerHTML = '<div class="empty-state">Failed to load case detail.</div>';
    }
  }

  function closePanel() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('detail-panel').classList.remove('open');
  }

  function showTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (currentCase) renderPanel(tab);
  }

  function renderPanel(tab) {
    const { case: c, audit_log, missing_documents, engagement_letter } = currentCase;
    const pill = document.getElementById('panel-status-pill');
    document.getElementById('panel-title').textContent = c.client_name || 'Unknown Client';
    pill.className = `status-pill status-${c.status}`;
    pill.textContent = c.status.replace(/_/g, ' ');

    if (tab === 'overview') renderOverview(c);
    else if (tab === 'activity') renderActivity(c.id);
    else if (tab === 'audit') renderAudit(audit_log);
    else if (tab === 'docs') renderDocs(missing_documents, c);
    else if (tab === 'letter') renderLetter(engagement_letter, c.id);
  }

  function renderOverview(c) {
    document.getElementById('panel-body').innerHTML = `
      <div class="info-grid">
        <div class="info-item"><label>Phone</label><p>${esc(c.client_phone || '—')}</p></div>
        <div class="info-item"><label>Email</label><p>${esc(c.client_email || '—')}</p></div>
        <div class="info-item"><label>Case Type</label><p style="text-transform:capitalize">${esc((c.case_type||'—').replace(/_/g,' '))}</p></div>
        <div class="info-item"><label>Jurisdiction</label><p>${esc(c.jurisdiction || '—')}</p></div>
        <div class="info-item"><label>Urgency</label><p style="text-transform:capitalize">${esc(c.urgency || '—')}</p></div>
        <div class="info-item"><label>Complexity</label><p style="text-transform:capitalize">${esc(c.complexity || '—')}</p></div>
        <div class="info-item"><label>Consultation</label><p>${c.consult_datetime ? new Date(c.consult_datetime).toLocaleString() : '—'}</p></div>
        <div class="info-item"><label>Created</label><p>${new Date(c.created_at).toLocaleString()}</p></div>
        <div class="info-item"><label>Follow-up count</label><p>${c.follow_up_count ?? 0}</p></div>
        <div class="info-item"><label>Intake source</label><p style="text-transform:capitalize">${esc(c.intake_source || '—')}</p></div>
      </div>
      <div class="section-title">Intake summary</div>
      <p style="font-size:.88rem;line-height:1.6;white-space:pre-wrap">${esc(c.raw_intake_text || 'No summary.')}</p>
    `;
  }

  const ACTIVITY_ICONS = {
    sms: '💬', calendar: '📅', conflict: '🛡️',
    classification: '🏷️', task: '📋', document: '📄', agent: '🤖'
  };
  const ACTIVITY_LABELS = {
    sms: 'SMS Communication', calendar: 'Calendar Event', conflict: 'Conflict Check',
    classification: 'AI Classification', task: 'Task Created', document: 'Document Update', agent: 'Agent Action'
  };

  async function renderActivity(caseId) {
    document.getElementById('panel-body').innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';
    try {
      const data = await apiFetch(`${API}/cases/${caseId}/activity`);
      if (!data.entries.length) {
        document.getElementById('panel-body').innerHTML = '<div class="empty-state"><div class="icon">🤖</div>No agent activity yet.<br><small>Submit an intake to see the AI pipeline in action.</small></div>';
        return;
      }
      document.getElementById('panel-body').innerHTML = `
        <p style="font-size:.82rem;color:var(--muted);margin-bottom:16px">${data.entries.length} agent actions — showing what the AI decided at each step</p>
        <div class="activity-feed">
          ${data.entries.map(e => `
            <div class="activity-item">
              <div class="activity-icon ${e.activity_type}">${ACTIVITY_ICONS[e.activity_type] || '🤖'}</div>
              <div class="activity-body">
                <div class="activity-label ${e.activity_type}">${ACTIVITY_LABELS[e.activity_type] || 'Agent Action'}</div>
                <div class="activity-reasoning">${esc(e.agent_reasoning)}</div>
                <div class="activity-time">${new Date(e.timestamp).toLocaleString()} · ${esc(e.action_result)}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    } catch(e) {
      document.getElementById('panel-body').innerHTML = '<div class="empty-state">Failed to load activity.</div>';
    }
  }

  function renderAudit(entries) {
    if (!entries.length) {
      document.getElementById('panel-body').innerHTML = '<div class="empty-state"><div class="icon">📋</div>No audit entries yet.</div>';
      return;
    }
    document.getElementById('panel-body').innerHTML = entries.map(e => `
      <div class="audit-entry">
        <div class="audit-dot"></div>
        <div class="audit-content">
          <div class="audit-meta">${new Date(e.timestamp).toLocaleString()} · <code style="font-size:.75rem">${esc(e.action_taken)}</code></div>
          <b>${esc(e.agent_observation)}</b>
          <div class="audit-reasoning">${esc(e.agent_reasoning)}</div>
          <div style="margin-top:3px;font-size:.78rem;color:var(--muted)">Result: ${esc(e.action_result)}</div>
        </div>
      </div>
    `).join('');
  }

  function renderDocs(docs, c) {
    if (!docs.length) {
      document.getElementById('panel-body').innerHTML = '<div class="empty-state"><div class="icon">📄</div>No documents requested yet.</div>';
      return;
    }
    const outstanding = docs.filter(d => !d.received_at).length;
    document.getElementById('panel-body').innerHTML = `
      <p style="font-size:.85rem;color:var(--muted);margin-bottom:14px">${outstanding} outstanding · ${docs.length - outstanding} received</p>
      ${docs.map(d => `
        <div class="doc-row">
          <span style="text-transform:capitalize">${esc(d.document_type.replace(/_/g,' '))}</span>
          ${d.received_at
            ? `<span class="doc-received">✓ Received ${relativeTime(d.received_at)}</span>`
            : `<span class="doc-pending">Pending (requested ${relativeTime(d.requested_at)})</span>`}
        </div>
      `).join('')}
    `;
  }

  function renderLetter(letter, caseId) {
    const actions = `
      <div class="letter-actions">
        <button class="btn btn-primary" id="gen-btn" onclick="generateLetter('${caseId}')">
          ${letter ? 'Regenerate' : 'Generate letter'}
        </button>
        ${letter ? `<button class="btn btn-outline" onclick="copyLetter()">Copy</button>
        <button class="btn btn-outline" onclick="downloadLetter('${caseId}')">Download .txt</button>` : ''}
      </div>
    `;
    const content = letter
      ? `<div class="letter-box" id="letter-content">${esc(letter)}</div>`
      : `<div class="empty-state"><div class="icon">📝</div>No engagement letter generated yet.<br><small>Click "Generate letter" above.</small></div>`;
    document.getElementById('panel-body').innerHTML = actions + content;
  }

  async function generateLetter(caseId) {
    const btn = document.getElementById('gen-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Generating…';
    try {
      const headers = {};
      const token = getToken();
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(`/api/intake/${caseId}/engagement-letter?regenerate=true`, { headers });
      if (res.status === 401) { showLoginPrompt(); return; }
      const text = await res.text();
      currentCase.engagement_letter = text;
      renderLetter(text, caseId);
    } catch(e) {
      btn.disabled = false;
      btn.textContent = 'Try again';
    }
  }

  function copyLetter() {
    const el = document.getElementById('letter-content');
    if (el) navigator.clipboard.writeText(el.textContent).then(() => alert('Copied!'));
  }

  function downloadLetter(caseId) {
    const el = document.getElementById('letter-content');
    if (!el) return;
    const blob = new Blob([el.textContent], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `engagement-letter-${caseId.slice(0,8)}.txt`;
    a.click();
  }

  // ── Helpers ─────────────────────────────────────────────────
  async function apiFetch(url) {
    const headers = {};
    const token = getToken();
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const r = await fetch(url, { headers });
    if (r.status === 401) { showLoginPrompt(); throw new Error('Unauthorized'); }
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }

  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function relativeTime(iso) {
    if (!iso) return '—';
    const diff = (Date.now() - new Date(iso).getTime()) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return Math.floor(diff/86400) + 'd ago';
  }

  boot();
</script>
</body>
</html>
